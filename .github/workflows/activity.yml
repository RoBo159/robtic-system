name: Repository Activity

on:
    push:
    issues:
        types: [opened, closed, reopened]
    pull_request:
        types: [opened, closed, reopened, synchronize]

jobs:
    notify:
        runs-on: ubuntu-latest

        steps:
            - name: Send Discord notification
              run: |
                  EVENT_URL="${{ github.event.pull_request.html_url || github.event.issue.html_url || github.event.head_commit.url || github.server_url }}/${{ github.repository }}"

                  curl -H "Content-Type: application/json" \
                  -d "{
                    \"username\": \"Robtic Repo\",
                    \"embeds\": [{
                      \"title\": \"Repository Activity\",
                      \"url\": \"$EVENT_URL\",
                      \"description\": \"📌 **Actor:** ${{ github.actor }}\n📂 **Repository:** ${{ github.repository }}\n🔗 [Open Event]($EVENT_URL)\",
                      \"color\": 3447003,
                      \"footer\": {
                        \"text\": \"Robtic CI Activity\"
                      }
                    }]
                  }" \
                  ${{ secrets.DISCORD_WEBHOOK_ACTIVITY }}
